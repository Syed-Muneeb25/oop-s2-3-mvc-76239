name: .NET CI

on:
  push:
    branches:
      - main
      - master
      - Vgc
  pull_request:
    branches:
      - main
      - master
      - Vgc
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Check circular project references
        shell: pwsh
        run: ./scripts/check-circular-project-references.ps1 -Root .

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
